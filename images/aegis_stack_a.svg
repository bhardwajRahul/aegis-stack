<svg width="2048" height="2048" viewBox="0 0 2048 2048" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aegis Stack Layered Shield Logo</title>
  <desc id="desc">A layered teal shield logo with an engraved A, designed for Aegis Stack.</desc>

  <defs>
    <linearGradient id="outerGrad" x1="1024" y1="160" x2="1024" y2="1880" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#69FFF5"/>
      <stop offset="0.34" stop-color="#17CCBF"/>
      <stop offset="1" stop-color="#08766F"/>
    </linearGradient>

    <linearGradient id="midGrad" x1="1024" y1="312" x2="1024" y2="1724" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1DEDE0"/>
      <stop offset="0.42" stop-color="#0EA89E"/>
      <stop offset="1" stop-color="#043B39"/>
    </linearGradient>

    <linearGradient id="coreGrad" x1="1024" y1="508" x2="1024" y2="1488" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#52FFF5"/>
      <stop offset="0.45" stop-color="#17CCBF"/>
      <stop offset="1" stop-color="#0A8F87"/>
    </linearGradient>

    <linearGradient id="aGrad" x1="1024" y1="660" x2="1024" y2="1320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061C24"/>
      <stop offset="1" stop-color="#020B10"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="34" stdDeviation="36" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="innerDepth" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#001A1C" flood-opacity="0.45"/>
    </filter>

    <filter id="aInset" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="-4" stdDeviation="3" flood-color="#5FFFF7" flood-opacity="0.28"/>
    </filter>

    <clipPath id="outerClip">
      <path d="M1024 130L1710 394V945C1710 1348 1441 1699 1024 1918C607 1699 338 1348 338 945V394L1024 130Z"/>
    </clipPath>
  </defs>

  <!-- transparent background -->

  <!-- subtle ambient glow, safe to remove for strict flat SVG usage -->
  <ellipse cx="1024" cy="1028" rx="650" ry="760" fill="#17CCBF" opacity="0.08"/>

  <!-- OUTER SHIELD -->
  <path d="M1024 130L1710 394V945C1710 1348 1441 1699 1024 1918C607 1699 338 1348 338 945V394L1024 130Z"
        fill="url(#outerGrad)" filter="url(#softShadow)"/>

  <!-- outer bevel/highlight -->
  <path d="M1024 164L1672 414V946C1672 1323 1424 1653 1024 1872C624 1653 376 1323 376 946V414L1024 164Z"
        stroke="#B7FFFA" stroke-width="10" opacity="0.55"/>

  <!-- dark inset cavity -->
  <path d="M1024 302L1554 510V947C1554 1261 1356 1540 1024 1734C692 1540 494 1261 494 947V510L1024 302Z"
        fill="#021A20" opacity="0.82"/>

  <!-- MIDDLE LAYER -->
  <path d="M1024 352L1503 540V944C1503 1234 1321 1494 1024 1678C727 1494 545 1234 545 944V540L1024 352Z"
        fill="url(#midGrad)" filter="url(#innerDepth)"/>

  <!-- middle layer bevel -->
  <path d="M1024 391L1454 561V940C1454 1203 1292 1441 1024 1617C756 1441 594 1203 594 940V561L1024 391Z"
        stroke="#76FFF7" stroke-width="8" opacity="0.42"/>

  <!-- INNER CORE SHIELD -->
  <path d="M1024 528L1348 658V938C1348 1138 1227 1318 1024 1452C821 1318 700 1138 700 938V658L1024 528Z"
        fill="url(#coreGrad)" filter="url(#innerDepth)"/>

  <!-- inner vertical engineered split -->
  <path d="M1024 528V1452" stroke="#D7FFFC" stroke-width="4" opacity="0.18"/>

  <!-- subtle modular stack notches -->
  <path d="M705 655L763 631" stroke="#D7FFFC" stroke-width="7" opacity="0.34" stroke-linecap="round"/>
  <path d="M1343 655L1285 631" stroke="#D7FFFC" stroke-width="7" opacity="0.34" stroke-linecap="round"/>
  <path d="M595 848H652" stroke="#D7FFFC" stroke-width="6" opacity="0.18" stroke-linecap="round"/>
  <path d="M1396 848H1453" stroke="#D7FFFC" stroke-width="6" opacity="0.18" stroke-linecap="round"/>

  <!-- ENGRAVED A -->
  <g filter="url(#aInset)">
    <path fill-rule="evenodd" clip-rule="evenodd"
      d="M907 1265H744L942 678H1106L1304 1265H1138L1105 1158H940L907 1265ZM978 1029H1068L1023 884L978 1029Z"
      fill="url(#aGrad)"/>
  </g>

  <!-- lower A cut bevel accent -->
  <path d="M935 1158H1111" stroke="#6FFFF7" stroke-width="8" opacity="0.22" stroke-linecap="round"/>

  <!-- top gloss, restrained -->
  <path d="M1024 164L1672 414V570L1024 320L376 570V414L1024 164Z"
        fill="#FFFFFF" opacity="0.07" clip-path="url(#outerClip)"/>
</svg>
